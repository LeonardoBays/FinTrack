name: fintrack
description: "FinTrack — Aplicativo de Controle Financeiro Pessoal"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.5
  get_it: ^8.0.0
  uuid: ^4.5.0
  intl: ^0.20.1
  google_fonts: ^6.2.1
  sqflite: ^2.3.0
  path: ^1.9.0
  sqflite_common_ffi: ^2.3.4
  currency_text_input_formatter: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.15

